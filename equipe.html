<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Equipe - BMO</title>
  <link rel="stylesheet" href="design.css">
</head>
<body class="perfil-page">
  <main class="perfil-layout">
    <header class="page-header perfil-header">
      <div>
        <h1 id="equipeNome">Equipe</h1>
        <p class="perfil-subtitle" id="equipeDescricao">Carregando detalhes da equipe...</p>
      </div>
      <div class="button-row">
        <button class="chats-nav-btn" onclick="window.history.back()">Voltar</button>
      </div>
    </header>

    <section class="card perfil-card">
      <div class="perfil-section">
        <img id="equipeFoto" class="perfil-avatar" alt="Foto da equipe" src="larva.jpeg">
      </div>

      <div id="blocoAdmin" class="perfil-section hidden">
        <h2>Convidar membro</h2>
        <div class="button-row">
          <input id="novoMembroId" placeholder="UID do usuário" />
          <button id="btnAdicionarMembro" class="btn-primary">Enviar convite</button>
        </div>
      </div>


      <div class="perfil-section">
        <h2>Comunicação da equipe</h2>
        <div class="button-row">
          <button id="btnAbrirChatEquipe" class="btn-primary">Abrir chat da equipe</button>
          <span id="alertaChatEquipe" class="perfil-subinfo"></span>
        </div>
      </div>

      <div class="perfil-section">
        <h2>Membros</h2>
        <ul id="listaMembros" class="empresa-candidaturas-grid"></ul>
      </div>
    </section>
  </main>

  <script type="module" src="equipe.js"></script>
</body>
</html>

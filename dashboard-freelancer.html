<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Freelancer - BMO</title>
  <link rel="stylesheet" href="design.css">
  <link rel="icon" href="logo.png" type="image/x-icon">
</head>
<body class="freelancer-dashboard-page">
  <main class="freelancer-dashboard">
    <header class="page-header freelancer-topbar">
      <div>
        <h1>Problemas disponíveis</h1>
        <p id="resumoProblemas" class="freelancer-subtitle">Carregando oportunidades...</p>
      </div>
      <div class="dashboard-menu-wrapper">
        <button class="menu-hamburger-btn" type="button" data-menu-trigger="menuOverlayFreelancer" aria-label="Abrir menu" onclick="window.__bmoOpenMenu && window.__bmoOpenMenu('menuOverlayFreelancer')">
          <span></span><span></span><span></span>
        </button>
      </div>
    </header>


    <div id="menuOverlayFreelancer" class="dashboard-menu-overlay hidden" role="dialog" aria-modal="true">
      <div class="dashboard-menu-panel">
        <div class="dashboard-menu-head">
          <h2>Menu freelancer</h2>
          <button class="chat-nav-btn" type="button" data-menu-close="menuOverlayFreelancer" aria-label="Fechar menu" onclick="window.__bmoCloseMenu && window.__bmoCloseMenu('menuOverlayFreelancer')">×</button>
        </div>
        <div class="button-row freelancer-nav-group dashboard-menu-actions">
          <button class="freelancer-nav-btn" onclick="window.location.href='perfil-freelancer.html'">Meu perfil</button>
          <button class="freelancer-nav-btn" onclick="window.location.href='meus-amigos.html'">Meus amigos</button>
          <button class="freelancer-nav-btn" onclick="window.location.href='busca-perfis.html'">Buscar perfis</button>
          <button class="freelancer-nav-btn" onclick="window.location.href='minhas-equipes.html'">Minhas equipes</button>
          <button class="freelancer-nav-btn" onclick="window.location.href='meus-chats.html'">Meus chats</button>
        </div>
      </div>
    </div>

    <section class="freelancer-filtros" aria-label="Filtros de problemas">
      <input id="buscaProblemas" type="search" placeholder="Buscar por palavra-chave" />
      <select id="filtroCategoria">
        <option value="todos">Todas as categorias</option>
      </select>
      <select id="filtroNivel">
        <option value="todos">Todos os níveis</option>
        <option value="iniciante">Iniciante</option>
        <option value="intermediario">Intermediário</option>
      </select>
      <select id="ordenacaoProblemas">
        <option value="recentes">Mais recentes</option>
        <option value="antigos">Mais antigos</option>
        <option value="candidaturas">Mais candidaturas</option>
        <option value="prazo">Prazo</option>
      </select>
    </section>

    <p id="loadingProblemas" class="freelancer-loading">Carregando problemas...</p>
    <ul id="lista" class="freelancer-grid" aria-live="polite"></ul>
    <div id="estadoVazio" class="freelancer-empty hidden">Não há problemas disponíveis no momento. Volte em breve.</div>
  </main>

    <div id="modalDetalhes" class="freelancer-modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalDetalhesTitulo">
      <div class="freelancer-modal-content">
        <button id="fecharModalDetalhes" class="freelancer-modal-close" aria-label="Fechar detalhes">×</button>
        <h2 id="modalDetalhesTitulo">Detalhes do problema</h2>
        <p id="modalDetalhesSubtitulo" class="freelancer-modal-subtitle"></p>
        <p id="modalDetalhesDescricao" class="freelancer-modal-description"></p>
        <h3>Detalhamento completo</h3>
        <p id="modalDetalhesTexto" class="freelancer-modal-detail"></p>
      </div>
    </div>

  <script type="module" src="dashboard-menu.js"></script>
  <script type="module" src="animation.js"></script>
  <script type="module" src="freelancer.js"></script>
</body>
</html>
